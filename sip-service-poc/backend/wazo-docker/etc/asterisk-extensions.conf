[globals](+)
WAZO_AGID_IP = agid
; Timeout settings to prevent call drops
TIMEOUT_ABSOLUTE = 3600
TIMEOUT_DIAL = 30
TIMEOUT_RING = 30
TIMEOUT_ANSWER = 30
; Set default language to Russian
LANGUAGE=ru

[default]
; Echo Test - User hears their own voice back
exten => *43,1,NoOp(Echo Test Started)
exten => *43,n,Answer()
exten => *43,n,Wait(1)
exten => *43,n,Playback(demo-echotest)
exten => *43,n,Echo()
exten => *43,n,Hangup()

; Extension 100
exten => 100,1,NoOp(Calling Extension 100)
exten => 100,n,Set(CDR(userfield)=Extension 100)
exten => 100,n,Set(TIMEOUT(absolute)=3600)
exten => 100,n,Dial(PJSIP/100,30)
exten => 100,n,Hangup()

; Extension 1000 - AI Bot (ARI Handler)
exten => 1000,1,NoOp(Calling AI Bot Extension 1000)
exten => 1000,n,Set(CDR(userfield)=AI Bot)
exten => 1000,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1000,n,Set(TIMEOUT(absolute)=7200)
exten => 1000,n,Set(TIMEOUT(dial)=360)
exten => 1000,n,Set(TIMEOUT(ring)=360)
exten => 1000,n,Set(TIMEOUT(answer)=360)
exten => 1000,n,Answer()
exten => 1000,n,Stasis(voice-bot,1000)
exten => 1000,n,Hangup()

; Fallback if ARI is not available
exten => 1000,100,NoOp(ARI fallback - Bot not available)
exten => 1000,n,Set(CDR(userfield)=AI Bot Fallback)
exten => 1000,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1000,n,Answer()
exten => 1000,n,Playback(ru/tt-allbusy)
exten => 1000,n,Playback(ru/vm-goodbye)
exten => 1000,n,Hangup()



; Extension 1002 - Support Queue
exten => 1002,1,NoOp(Calling Support Queue Extension 1002)
exten => 1002,n,Set(CDR(userfield)=Support Queue)
exten => 1002,n,Set(CDR(disposition)=ANSWERED)
exten => 1002,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1002,n,Set(TIMEOUT(absolute)=3600)
exten => 1002,n,Set(LANGUAGE=ru)
exten => 1002,n,Answer()
exten => 1002,n,Playback(ru/queue-hold)
exten => 1002,n,Queue(support-queue,t,,,45,10)
exten => 1002,n,NoOp(Queue completed)
exten => 1002,n,Hangup()


; Extension 1004 - Busy Line Handler (with custom message)
exten => 1004,1,NoOp(Busy Line Handler Extension 1004)
exten => 1004,n,Set(CDR(userfield)=Busy Line Handler)
exten => 1004,n,Set(CDR(disposition)=ANSWERED)
exten => 1004,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1004,n,Set(LANGUAGE=ru)
exten => 1004,n,Answer()
exten => 1004,n,Playback(ru/tt-allbusy)
exten => 1004,n,Playback(ru/vm-goodbye)
exten => 1004,n,Hangup()

; Extension 1007 - Busy Line with Queue (Russian message)
exten => 1007,1,NoOp(Busy Line with Queue Extension 1007)
exten => 1007,n,Set(CDR(userfield)=Busy Line with Queue)
exten => 1007,n,Set(CDR(disposition)=ANSWERED)
exten => 1007,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1007,n,Set(LANGUAGE=ru)
exten => 1007,n,Answer()
exten => 1007,n,Playback(ru/tt-allbusy)
exten => 1007,n,Queue(ai-bot-queue,t,,,30,5)
exten => 1007,n,NoOp(Queue completed)
exten => 1007,n,Hangup()

; Extension 1008 - Busy Line with Custom Message
exten => 1008,1,NoOp(Busy Line with Custom Message Extension 1008)
exten => 1008,n,Set(CDR(userfield)=Busy Line with Custom Message)
exten => 1008,n,Set(CDR(disposition)=ANSWERED)
exten => 1008,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1008,n,Set(LANGUAGE=ru)
exten => 1008,n,Answer()
exten => 1008,n,Playback(ru/tt-allbusy)
exten => 1008,n,Playback(ru/vm-goodbye)
exten => 1008,n,Hangup()

; Extension 1005 - AI Bot with Queue Fallback
exten => 1005,1,NoOp(Calling AI Bot with Queue Fallback Extension 1005)
exten => 1005,n,Set(CDR(userfield)=AI Bot with Queue Fallback)
exten => 1005,n,Set(CDR(disposition)=ANSWERED)
exten => 1005,n,Set(CHANNEL(amaflags)=DOCUMENTATION)
exten => 1005,n,Set(TIMEOUT(absolute)=3600)
exten => 1005,n,Set(LANGUAGE=ru)
exten => 1005,n,Answer()
exten => 1005,n,Set(TIMEOUT(dial)=30)
exten => 1005,n,Dial(PJSIP/1000,30)
exten => 1005,n,NoOp(AI Bot not available, trying queue)
exten => 1005,n,Playback(ru/queue-hold)
exten => 1005,n,Queue(ai-bot-queue,t,,,30,5)
exten => 1005,n,NoOp(Queue completed)
exten => 1005,n,Hangup()

; Simple test extension (for debugging)
exten => 1006,1,NoOp(Test Extension 1006)
exten => 1006,n,Set(LANGUAGE=ru)
exten => 1006,n,Answer()
exten => 1006,n,Playback(ru/tt-allbusy)
exten => 1006,n,Playback(ru/vm-goodbye)
exten => 1006,n,Hangup()

; Public extension (no registration required)
exten => 999,1,NoOp(Public Test Extension)
exten => 999,n,Set(LANGUAGE=ru)
exten => 999,n,Answer()
exten => 999,n,Playback(ru/tt-allbusy)
exten => 999,n,Playback(ru/vm-goodbye)
exten => 999,n,Hangup()

[from-provider]
; Match your provider DID pattern here instead of a catch-all when possible.
exten => _X!,1,NoOp(Incoming call from ${CALLERID(num)} to ${EXTEN})
same => n,Goto(default,1000,1)
