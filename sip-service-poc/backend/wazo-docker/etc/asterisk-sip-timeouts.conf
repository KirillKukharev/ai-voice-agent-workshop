[general]
; SIP timeout settings for MicroSIP compatibility
sip_timeout = 36000
sip_retry = 3
sip_keep_alive = 20

; RTP timeout settings
rtp_timeout = 600
rtp_hold_timeout = 600
rtp_keepalive = 20

; Call timeout settings
maxcall = 36000
maxcallers = 100
maxexpiry = 36000
minexpiry = 30
defaultexpiry = 60

; Registration timeout settings
regcontext = default
register_retry_403 = 30
register_retry_404 = 30
register_retry_408 = 30
register_retry_500 = 30
register_retry_502 = 30
register_retry_503 = 30
register_retry_504 = 30

; Keep alive settings - more aggressive for MicroSIP
keep_alive_interval = 20
keep_alive_count = 2

; Qualify settings
qualify_frequency = 20
qualify_timeout = 2.0

; PJSIP specific timeouts
[pjsip]
; System level timeouts
timer_t1 = 500
timer_b = 15000
timer_f = 32000
timer_h = 64000
timer_j = 32000
timer_4xx = 5000
timer_5xx = 5000
timer_6xx = 5000

; Endpoint level timeouts
rtp_timeout = 600
rtp_hold_timeout = 600
rtp_keepalive = 20

; AOR level timeouts
qualify_frequency = 20
qualify_timeout = 2.0
maximum_expiration = 36000
minimum_expiration = 30
default_expiration = 60
