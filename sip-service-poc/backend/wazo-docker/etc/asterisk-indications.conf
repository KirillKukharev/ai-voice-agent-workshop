; Russian language indications configuration
; This file configures Russian language support for Asterisk

[general]
; Set default language to Russian
language = ru

; Russian language settings
[ru]
; Russian language configuration
description = Russian
; Set Russian as default language
default = yes
; Russian country code
country = RU
; Russian timezone
timezone = Europe/Moscow
; Russian date format
dateformat = %d.%m.%Y
; Russian time format
timeformat = %H:%M:%S
; Russian number format
numberformat = +7 (XXX) XXX-XX-XX
