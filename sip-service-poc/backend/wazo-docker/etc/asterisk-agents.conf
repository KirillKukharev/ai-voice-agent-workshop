[general]
; Agent configuration for Wazo AI Bot integration
; This file defines agents for queue management

; Default agent settings
autologoff = yes
autologoffunavail = yes
updatecdr = no
ackcall = no
endcall = no
wrapuptime = 0
maxloginattempts = 3
logoffaftercall = no
; Agent timeout

timeout = 30
; Agent retry
retry = 5
; Agent wrapup time
wrapuptime = 10
; Agent max login attempts
maxloginattempts = 3
; Agent logoff after call
logoffaftercall = no
; Agent ack call
ackcall = no
; Agent end call
endcall = no
; Agent update CDR
updatecdr = no
; Agent auto logoff
autologoff = yes
; Agent auto logoff unavailable
autologoffunavail = yes

