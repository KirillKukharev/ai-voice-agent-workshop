[general]
; Redirect configuration for Wazo AI Bot integration
; This file defines redirect rules for call management

; Default redirect settings
redirect_extension = 1004
redirect_context = default
redirect_priority = 1
redirect_timeout = 30
redirect_retry = 5
redirect_max_attempts = 3
redirect_fallback = 1004

; AI Bot redirect rules
[ai-bot-redirect]
; Redirect to AI Bot queue when busy
redirect_extension = 1004
redirect_context = default
redirect_priority = 1
redirect_timeout = 30
redirect_retry = 5
redirect_max_attempts = 3

; Support redirect rules
[support-redirect]
; Redirect to support queue when busy
redirect_extension = 1002
redirect_context = default
redirect_priority = 1
redirect_timeout = 45
redirect_retry = 10
redirect_max_attempts = 3
redirect_fallback = 1004


; Busy line redirect rules
[busy-redirect]
; Redirect to busy line handler
redirect_extension = 1004
redirect_context = default
redirect_priority = 1
redirect_timeout = 30
redirect_retry = 5
redirect_max_attempts = 3
redirect_fallback = 1004
