[general]
; Queue configuration for Wazo AI Bot integration
; This file defines queues for call routing and management

; Default queue settings
persistentmembers = yes
autofill = yes
monitor-type = MixMonitor
monitor-format = wav
monitor-options = b

; Queue for AI Bot calls
[ai-bot-queue]
; AI Bot queue configuration
strategy = ringall
timeout = 30
retry = 5
maxlen = 10
announce-frequency = 30
announce-holdtime = yes
announce-position = yes
joinempty = yes
leavewhenempty = no
ringinuse = no
autopause = no
autopausedelay = 0
reportholdtime = yes
memberdelay = 0
weight = 0
timeoutrestart = no
; Announcement when joining queue
announce = ru/queue-hold
; Russian system messages for proper digit pronunciation
queue-thereare = ru/queue-thereare
queue-callswaiting = ru/queue-callswaiting
queue-minutes = ru/queue-minutes
queue-seconds = ru/queue-seconds
queue-thankyou = ru/queue-thankyou
queue-youarenext = ru/queue-youarenext
queue-reporthold = ru/queue-reporthold
queue-periodic-announce = ru/queue-periodic-announce
; Music on hold
musiconhold = default
; Context for callers
context = default
; Language - critical for digit pronunciation
language = ru
; Say configuration for Russian digits
say-language = ru

; Queue for support calls
[support-queue]
; Support queue configuration
strategy = ringall
timeout = 45
retry = 10
maxlen = 20
announce-frequency = 30
announce-holdtime = yes
announce-position = yes
joinempty = yes
leavewhenempty = no
ringinuse = no
autopause = no
autopausedelay = 0
reportholdtime = yes
memberdelay = 0
weight = 0
timeoutrestart = no
; Announcement when joining queue
announce = ru/queue-hold
; Russian system messages for proper digit pronunciation
queue-thereare = ru/queue-thereare
queue-callswaiting = ru/queue-callswaiting
queue-minutes = ru/queue-minutes
queue-seconds = ru/queue-seconds
queue-thankyou = ru/queue-thankyou
queue-youarenext = ru/queue-youarenext
queue-reporthold = ru/queue-reporthold
queue-periodic-announce = ru/queue-periodic-announce
; Music on hold
musiconhold = default
; Context for callers
context = default
; Language - critical for digit pronunciation
language = ru
; Say configuration for Russian digits
say-language = ru
