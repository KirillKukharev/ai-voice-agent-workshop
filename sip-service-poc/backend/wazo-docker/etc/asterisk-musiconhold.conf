; Music on Hold configuration for Russian language
; This file configures music on hold with Russian language support

[general]
; Default music on hold class
default = default

; Russian music on hold class
[ru-default]
; Russian default music on hold
mode = files
directory = /var/lib/asterisk/sounds/ru
; Randomize playback
random = yes
; Loop indefinitely
loop = yes
; Format of audio files
format = gsm
; Sort order
sort = alpha

; Russian queue music (fallback to default)
[ru-queue]
; Russian queue music on hold
mode = files
directory = /var/lib/asterisk/sounds
; Randomize playback
random = yes
; Loop indefinitely
loop = yes
; Format of audio files
format = gsm
; Sort order
sort = alpha

; Russian support music (fallback to default)
[ru-support]
; Russian support music on hold
mode = files
directory = /var/lib/asterisk/sounds
; Randomize playback
random = yes
; Loop indefinitely
loop = yes
; Format of audio files
format = gsm
; Sort order
sort = alpha
