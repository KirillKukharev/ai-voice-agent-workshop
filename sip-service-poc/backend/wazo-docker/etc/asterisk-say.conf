; Say configuration for Russian language support
; This file configures text-to-speech for Russian language

[general]
; Set default language to Russian
language = ru
; Russian language settings
[ru]
; Russian language configuration
description = Russian
; Set Russian as default language
default = yes
; Russian country code
country = RU
; Russian timezone
timezone = Europe/Moscow
; Russian date format
dateformat = %d.%m.%Y
; Russian time format
timeformat = %H:%M:%S
; Russian number format
numberformat = +7 (XXX) XXX-XX-XX

; Russian digit pronunciation
zero = "ноль"
one = "один"
two = "два"
three = "три"
four = "четыре"
five = "пять"
six = "шесть"
seven = "семь"
eight = "восемь"
nine = "девять"
ten = "десять"
eleven = "одиннадцать"
twelve = "двенадцать"
thirteen = "тринадцать"
fourteen = "четырнадцать"
fifteen = "пятнадцать"
sixteen = "шестнадцать"
seventeen = "семнадцать"
eighteen = "восемнадцать"
nineteen = "девятнадцать"
twenty = "двадцать"
thirty = "тридцать"
forty = "сорок"
fifty = "пятьдесят"
sixty = "шестьдесят"
seventy = "семьдесят"
eighty = "восемьдесят"
ninety = "девяносто"
hundred = "сто"
thousand = "тысяча"

; Russian time units
minute = "минута"
minutes = "минуты"
second = "секунда"
seconds = "секунды"
hour = "час"
hours = "часы"
day = "день"
days = "дни"
week = "неделя"
weeks = "недели"
month = "месяц"
months = "месяцы"
year = "год"
years = "годы"
