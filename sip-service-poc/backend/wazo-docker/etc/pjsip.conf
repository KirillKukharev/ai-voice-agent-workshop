; ===== TRANSPORTS =====
[transport-udp-5060]
type=transport
protocol=udp
bind=0.0.0.0:5060

[transport-udp-8080]
type=transport
protocol=udp
bind=0.0.0.0:8080

; ===== SIP TRUNK / PROVIDER =====
; Replace 198.51.100.1, credentials, and example.invalid with your operator settings.
[provider-auth]
type=auth
auth_type=userpass
username=trunk_user_placeholder
password=trunk_password_placeholder

[provider-aor]
type=aor
contact=sip:example.invalid:5060
qualify_frequency=0

[provider-endpoint]
type=endpoint
context=from-provider
disallow=all
allow=g722,alaw,ulaw
aors=provider-aor
outbound_auth=provider-auth
from_user=trunk_user_placeholder
from_domain=example.invalid
transport=transport-udp-5060
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
direct_media=no
trust_id_inbound=yes
trust_id_outbound=yes
permit=198.51.100.1/32

[provider-registration]
type=registration
outbound_auth=provider-auth
server_uri=sip:198.51.100.1:5060
client_uri=sip:trunk_user_placeholder@198.51.100.1
expiration=3600
retry_interval=30
transport=transport-udp-5060
contact_user=trunk_user_placeholder

[provider-identify-domain]
type=identify
endpoint=provider-endpoint
match=example.invalid

[provider-identify-ip]
type=identify
endpoint=provider-endpoint
match=198.51.100.1/32

; ===== INTERNAL USERS =====
[auth-user1000]
type=auth
auth_type=userpass
username=1000
password=changeme

[aor-user1000]
type=aor
max_contacts=1
qualify_frequency=30

[endpoint-user1000]
type=endpoint
context=default
disallow=all
allow=g722,alaw,ulaw
auth=auth-user1000
aors=aor-user1000
callerid="User 1000" <1000>
transport=transport-udp-5060
force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes
direct_media=no

[identify-user1000]
type=identify
endpoint=endpoint-user1000
match=172.24.0.0/16
