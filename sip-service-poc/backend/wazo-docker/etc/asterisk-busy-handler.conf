; Busy line handler configuration for Wazo AI Bot integration
; This file defines how to handle busy lines and redirect calls

[general]
; General busy line settings
busy_extension = 1004
busy_context = default
busy_priority = 1
busy_timeout = 30
busy_retry = 5
busy_max_attempts = 3
busy_fallback = 1004

; Busy line message settings
busy_message = "Извините, все операторы заняты. Пожалуйста, оставайтесь на линии, и мы скоро ответим."
busy_message_language = ru
busy_message_voice = female
busy_message_speed = normal
busy_message_volume = 1.0

; Queue settings for busy lines
queue_timeout = 30
queue_retry = 5
queue_max_attempts = 3
queue_announce_frequency = 30
queue_announce_holdtime = true
queue_announce_position = true
queue_joinempty = true
queue_leavewhenempty = false
queue_ringinuse = false
queue_autopause = false
queue_autopausedelay = 0
queue_reportholdtime = true
queue_memberdelay = 0
queue_weight = 0
queue_timeoutrestart = false


; Music on hold settings
musiconhold = default
musiconhold_random = true
musiconhold_loops = 0
musiconhold_volume = 0.8

; Call routing settings
call_routing_enabled = true
call_routing_strategy = ringall
call_routing_timeout = 30
call_routing_retry = 5
call_routing_max_attempts = 3
call_routing_fallback = 1004

; AI Bot integration settings
ai_bot_enabled = true
ai_bot_extension = 1000
ai_bot_busy_extension = 1004
ai_bot_timeout = 30
ai_bot_retry = 5
ai_bot_max_attempts = 3
ai_bot_fallback = 1004

; Support integration settings
support_enabled = true
support_extension = 1002
support_queue_extension = 1002
support_busy_extension = 1004
support_timeout = 45
support_retry = 10
support_max_attempts = 3
support_fallback = 1004
